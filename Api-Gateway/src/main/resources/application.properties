spring.application.name=Api-Gateway
server.port=8080

jwt.secret=v5zti3ggthj4radzaynh5q9uoezj66cl
jwt.expiration=3600000

spring.cloud.gateway.server.webmvc.routes[0].id=usuarios-service
spring.cloud.gateway.server.webmvc.routes[0].uri=${USUARIOS_SERVICE_URL:http://localhost:8084}
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/petly/usuarios/**,/petly/auth/**
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=CircuitBreaker=usuariosCircuitBreaker,forward:/fallback/usuarios

spring.cloud.gateway.server.webmvc.routes[1].id=reportes-service
spring.cloud.gateway.server.webmvc.routes[1].uri=${REPORTES_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/petly/reportes/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=CircuitBreaker=reportesCircuitBreaker,forward:/fallback/reportes

spring.cloud.gateway.server.webmvc.routes[2].id=geolocalizacion-service
spring.cloud.gateway.server.webmvc.routes[2].uri=${GEO_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/petly/geo/**
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=CircuitBreaker=geoCircuitBreaker,forward:/fallback/geolocalizacion

spring.cloud.gateway.server.webmvc.routes[3].id=mascotas-service
spring.cloud.gateway.server.webmvc.routes[3].uri=${MASCOTAS_SERVICE_URL:http://localhost:8083}
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/petly/mascotas/**
spring.cloud.gateway.server.webmvc.routes[3].filters[0]=CircuitBreaker=mascotasCircuitBreaker,forward:/fallback/mascotas

spring.cloud.gateway.server.webmvc.routes[4].id=notificaciones-service
spring.cloud.gateway.server.webmvc.routes[4].uri=${NOTIFICACIONES_SERVICE_URL:http://localhost:8086}
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/petly/notificaciones/**
spring.cloud.gateway.server.webmvc.routes[4].filters[0]=CircuitBreaker=notificacionesCircuitBreaker,forward:/fallback/notificaciones

spring.cloud.gateway.server.webmvc.routes[5].id=coincidencias-service
spring.cloud.gateway.server.webmvc.routes[5].uri=${COINCIDENCIAS_SERVICE_URL:http://localhost:8085}
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/petly/coincidencias/**
spring.cloud.gateway.server.webmvc.routes[5].filters[0]=CircuitBreaker=coincidenciasCircuitBreaker,forward:/fallback/coincidencias

# Actuator
management.endpoints.web.exposure.include=health,info,circuitbreakers,circuitbreakerevents
management.health.circuitbreakers.enabled=true

# Configuracion general de Circuit Breaker
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=10s
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.automaticTransitionFromOpenToHalfOpenEnabled=true

# Instancias usadas por las rutas del Gateway
resilience4j.circuitbreaker.instances.usuariosCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.reportesCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.geoCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.mascotasCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.notificacionesCircuitBreaker.baseConfig=default
resilience4j.circuitbreaker.instances.coincidenciasCircuitBreaker.baseConfig=default
